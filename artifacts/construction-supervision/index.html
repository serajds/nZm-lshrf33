    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
      html, body { margin: 0; padding: 0; background: #ffffff; }
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 999999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        background: #ffffff;
        color: #1f4d8b;
        font-family: 'Noto Kufi Arabic', sans-serif;
        transition: opacity 0.2s ease, visibility 0.2s ease;
        padding: 24px;
        text-align: center;
      }
      #app-splash.splash-hide {
        opacity: 0;
        visibility: hidden;
      }
      #app-splash .splash-logo {
        width: 132px;
        height: 132px;
        border-radius: 28px;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 18px 40px rgba(31, 77, 139, 0.18), 0 2px 6px rgba(0,0,0,0.06);
        animation: splash-pop 0.7s cubic-bezier(.2,.9,.3,1.2);
      }
      #app-splash .splash-logo img {
        width: 92px;
        height: 92px;
        object-fit: contain;
      }
      #app-splash .splash-title {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.3px;
        margin: 0;
        color: #1f4d8b;
        opacity: 0;
        animation: splash-fade 0.6s ease 0.15s forwards;
      }
      #app-splash .splash-sub {
        font-size: 13px;
        font-weight: 400;
        opacity: 0;
        color: rgba(31, 77, 139, 0.65);
        margin: 0;
        animation: splash-fade 0.6s ease 0.3s forwards;
      }
      #app-splash .splash-spinner {
        width: 36px;
        height: 36px;
        border: 3px solid rgba(31, 77, 139, 0.15);
        border-top-color: #1f4d8b;
        border-radius: 50%;
        animation: splash-spin 0.9s linear infinite;
        margin-top: 8px;
      }
      @keyframes splash-pop {
        0% { transform: scale(0.6); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
      }
      @keyframes splash-fade {
        to { opacity: 1; }
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <div id="app-splash" role="status" aria-live="polite" aria-label="جاري تحميل التطبيق">
      <div class="splash-logo">
        <img src="/app-icon.png" alt="" />
      </div>
      <h1 class="splash-title">إدارة الإشراف والمتابعة</h1>
      <p class="splash-sub">جاري تحميل التطبيق…</p>
      <div class="splash-spinner" aria-hidden="true"></div>
    </div>

    <script>
      // Safety net only: hides the splash if React never mounts within 5s
      // (e.g. a lazy chunk failed to load on a flaky connection). Under
      // normal conditions main.tsx clears this timer on the first paint,
      // so it never fires.
      window.__splashSafetyTimer = setTimeout(function () {
        var s = document.getElementById('app-splash');
        if (s) s.classList.add('splash-hide');
      }, 5000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

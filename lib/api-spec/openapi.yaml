        reportDate:
          type: string
          format: date
        periodStart:
          type: string
          format: date
        periodEnd:
          type: string
          format: date
        workDescription:
          type: string
        progressPercentage:
          type: number
        technicalNotes:
          type: ["string", "null"]
        recommendations:
          type: ["string", "null"]
        imageUrls:
          type: array
          items:
            type: string
        activitiesSnapshot:
          type: ["array", "null"]
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              plannedStartDate:
                type: string
              plannedEndDate:
                type: string
              actualStartDate:
                type: ["string", "null"]
              actualEndDate:
                type: ["string", "null"]
              plannedProgress:
                type: number
              actualProgress:
                type: number
              status:
                type: string
              sortOrder:
                type: integer
        createdById:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - type
        - reportDate
        - periodStart
        - periodEnd
        - workDescription
        - progressPercentage
        - imageUrls
        - createdAt
        - updatedAt

    CreateReportBody:
      type: object
      properties:
        type:
          type: string
          enum: [weekly, monthly]
        reportDate:
          type: string
          format: date
        periodStart:
          type: string
          format: date
        periodEnd:
          type: string
          format: date
        workDescription:
          type: string
        progressPercentage:
          type: number
        technicalNotes:
          type: ["string", "null"]
        recommendations:
          type: ["string", "null"]
        imageUrls:
          type: array
          items:
            type: string
      required:
        - type
        - reportDate
        - periodStart
        - periodEnd
        - workDescription
        - progressPercentage

    UpdateReportBody:
      type: object
      properties:
        type:
          type: ["string", "null"]
          enum: [weekly, monthly, null]
        reportDate:
          type: ["string", "null"]
          format: date
        periodStart:
          type: ["string", "null"]
          format: date
        periodEnd:
          type: ["string", "null"]
          format: date
        workDescription:
          type: ["string", "null"]
        progressPercentage:
          type: ["number", "null"]
        technicalNotes:
          type: ["string", "null"]
        recommendations:
          type: ["string", "null"]
        imageUrls:
          type: array
          items:
            type: string

    # Files
    ProjectFile:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        filename:
          type: string
        originalName:
          type: string
        category:
          type: string
          enum: [image, pdf, test_result, document, other]
        fileUrl:
          type: string
        fileSize:
          type: integer
        mimeType:
          type: string
        description:
          type: ["string", "null"]
        uploadedAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - filename
        - originalName
        - category
        - fileUrl
        - fileSize
        - mimeType
        - uploadedAt

    # Owner portal
    OwnerVerifyBody:
      type: object
      properties:
        token:
          type: string
        password:
          type: string
      required:
        - token

    OwnerProjectView:
      type: object
      properties:
        project:
          $ref: "#/components/schemas/Project"
        activities:
          type: array
          items:
            $ref: "#/components/schemas/Activity"
        reports:
          type: array
          items:
            $ref: "#/components/schemas/Report"
        summary:
          $ref: "#/components/schemas/ProjectSummary"
      required:
        - project
        - activities
        - reports
        - summary

    GenerateOwnerLinkBody:
      type: object
      properties:
        password:
          type: string
        customSlug:
          type: string

    OwnerLinkResponse:
      type: object
      properties:
        token:
          type: string
        url:
          type: string
      required:
        - token
        - url

    # Dashboard
    DashboardSummary:
      type: object
      properties:
        totalProjects:
          type: integer
        activeProjects:
          type: integer
        completedProjects:
          type: integer
        delayedProjects:
          type: integer
        suspendedProjects:
          type: integer
        averageProgress:
          type: number
        totalReports:
          type: integer
        totalActivities:
          type: integer
        completedActivities:
          type: integer
        delayedActivities:
          type: integer
        inProgressActivities:
          type: integer
        recentProjects:
          type: array
          items:
            $ref: "#/components/schemas/Project"
        allProjects:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              overallProgress:
                type: number
              plannedProgress:
                type: number
              status:
                type: string
              daysRemaining:
                type: integer
              ownerEntity:
                type: ["string", "null"]
              startDate:
                type: ["string", "null"]
              expectedEndDate:
                type: ["string", "null"]
              noSchedule:
                type: boolean
              overrunDays:
                type: integer
                description: Days passed after expectedEndDate while progress < 100%
        recentReports:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              projectId:
                type: integer
              type:
                type: string
              reportDate:
                type: string
              progressPercentage:
                type: number
        delayedActivitiesList:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              projectId:
                type: integer
              projectName:
                type: string
              plannedEndDate:
                type: ["string", "null"]
              actualProgress:
                type: number
              delayDays:
                type: integer
      required:
        - totalProjects
        - activeProjects
        - completedProjects
        - delayedProjects
        - suspendedProjects
        - averageProgress
        - totalReports
        - totalActivities
        - completedActivities
        - delayedActivities
        - inProgressActivities
        - recentProjects
        - allProjects
        - recentReports
        - delayedActivitiesList

    ProjectSummary:
      type: object
      properties:
        projectId:
          type: integer
        overallProgress:
          type: number
        plannedProgress:
          type: number
        activitiesTotal:
          type: integer
        activitiesCompleted:
          type: integer
        activitiesDelayed:
          type: integer
        daysElapsed:
          type: integer
        totalDays:
          type: integer
        daysRemaining:
          type: integer
        delayDays:
          type: integer
        suspensionDays:
          type: integer
        netDelayDays:
          type: integer
        overrunDays:
          type: integer
          description: Days passed after expectedEndDate while progress < 100%
        reportsCount:
          type: integer
        filesCount:
          type: integer
        noSchedule:
          type: boolean
      required:
        - projectId
        - overallProgress
        - plannedProgress
        - activitiesTotal
        - activitiesCompleted
        - activitiesDelayed
        - daysElapsed
        - totalDays
        - daysRemaining
        - delayDays
        - suspensionDays
        - netDelayDays
        - reportsCount
        - filesCount

    DeviationAnalysis:
      type: object
      properties:
        projectId:
          type: integer
        timeDeviation:
          type: number
        progressDeviation:
          type: number
        plannedProgress:
          type: number
          description: Weighted planned progress for the project at today's date.
        actualProgress:
          type: number
          description: Weighted actual progress (overall project progress).
        status:
          type: string
          enum: [on_track, slightly_delayed, significantly_delayed, ahead]
        criticalPathStatus:
          type: string
          enum: [healthy, at_risk, critical]
          description: Health of the critical path based on the count of activities deviating > 10%.
        suspensionDays:
          type: integer
        grossDelayDays:
          type: integer
        netDelayDays:
          type: integer
        overrunDays:
          type: integer
          description: Days passed after expectedEndDate while progress < 100%
        spi:
          type: ["number", "null"]
          description: Schedule Performance Index = actual / planned (>1 ahead, <1 behind).
        forecastCompletionDate:
          type: ["string", "null"]
          format: date
          description: Forecast completion date if the current pace continues.
        expectedProgressAtEnd:
          type: number
          description: Expected progress percentage at the contractual end date if the current pace continues.
        contractEndDate:
          type: ["string", "null"]
          format: date
        forecastDelayDays:
          type: integer
          description: Days between forecastCompletionDate and contractEndDate (positive = late).
        suspensionsBreakdown:
          type: array
          description: Breakdown of suspension days by cause type.
          items:
            type: object
            properties:
              type:
                type: string
                enum: [official_holiday, force_majeure, contractor_delay]
              days:
                type: integer
              count:
                type: integer
            required:
              - type
              - days
              - count
        recommendations:
          type: array
          description: Auto-generated recommendations based on the project state.
          items:
            type: object
            properties:
              severity:
                type: string
                enum: [info, warning, critical]
              title:
                type: string
              description:
                type: string
            required:
              - severity
              - title
              - description
        activitiesAnalysis:
          type: array
          items:
            $ref: "#/components/schemas/ActivityDeviation"
        noSchedule:
          type: boolean
      required:
        - projectId
        - timeDeviation
        - progressDeviation
        - status
        - activitiesAnalysis

    ActivityDeviation:
      type: object
      properties:
        activityId:
          type: integer
        activityName:
          type: string
        plannedProgress:
          type: number
        actualProgress:
          type: number
        deviation:
          type: number
        weight:
          type: number
          description: Activity weight used in the project-level weighted average.
        weightedImpact:
          type: number
          description: Contribution of this activity's deviation to overall project deviation (= deviation × weight / totalWeight).
        delayDays:
          type: ["integer", "null"]
          description: Deprecated alias for overrunDays (kept for backward compatibility)
        overrunDays:
          type: ["integer", "null"]
          description: Days past activity plannedEndDate while not completed
      required:
        - activityId
        - activityName
        - plannedProgress
        - actualProgress
        - deviation

    DeviationTimelinePoint:
      type: object
      properties:
        date:
          type: string
          format: date
        plannedProgress:
          type: number
        actualProgress:
          type: number
        deviation:
          type: number
      required:
        - date
        - plannedProgress
        - actualProgress
        - deviation

    DeviationTimeline:
      type: object
      properties:
        projectId:
          type: integer
        noSchedule:
          type: boolean
        points:
          type: array
          items:
            $ref: "#/components/schemas/DeviationTimelinePoint"
        suspensionsBreakdown:
          type: array
          description: Breakdown of suspension days by cause type for this project.
          items:
            type: object
            properties:
              type:
                type: string
                enum: [official_holiday, force_majeure, contractor_delay]
              days:
                type: integer
              count:
                type: integer
            required:
              - type
              - days
              - count
      required:
        - projectId
        - points
        - suspensionsBreakdown

    AttendanceCheckBody:
      type: object
      required:
        - selfie
        - latitude
        - longitude
      properties:
        selfie:
          type: string
          format: binary
        latitude:
          type: number
        longitude:
          type: number
        accuracy:
          type: ["number", "null"]
        notes:
          type: ["string", "null"]

    AttendanceRecord:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        userId:
          type: integer
        type:
          type: string
          enum: [check_in, check_out]
        recordedAt:
          type: string
          format: date-time
        latitude:
          type: ["number", "null"]
        longitude:
          type: ["number", "null"]
        accuracyMeters:
          type: ["number", "null"]
        distanceMeters:
          type: ["number", "null"]
        outOfRange:
          type: boolean
        selfieFilename:
          type: ["string", "null"]
        selfieUrl:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
      required:
        - id
        - projectId
        - userId
        - type
        - recordedAt
        - outOfRange

    AttendanceRecordWithUser:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        fullName:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        type:

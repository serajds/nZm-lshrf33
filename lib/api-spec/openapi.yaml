          format: date
        plannedEndDate:
          type: ["string", "null"]
          format: date
        actualStartDate:
          type: ["string", "null"]
          format: date
        actualEndDate:
          type: ["string", "null"]
          format: date
        plannedProgress:
          type: number
        actualProgress:
          type: number
        weight:
          type: number

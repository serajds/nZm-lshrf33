        status:
          type: string
          enum: [not_started, in_progress, completed, delayed]
        sortOrder:
          type: integer
        groupId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - name
        - plannedProgress
        - actualProgress
        - weight
        - status
        - sortOrder
        - createdAt

    CreateActivityBody:
      type: object
      properties:
        name:
          type: string
        plannedStartDate:
          type: ["string", "null"]
          format: date
        plannedEndDate:
          type: ["string", "null"]
          format: date
        actualStartDate:
          type: ["string", "null"]
          format: date
        actualEndDate:
          type: ["string", "null"]
          format: date
        plannedProgress:
          type: number
          default: 0
        actualProgress:
          type: number
          default: 0
        weight:
          type: number
          default: 1
        status:
          type: string
          enum: [not_started, in_progress, completed, delayed]
          default: not_started
        sortOrder:
          type: integer
          default: 0
        groupId:
          type: ["integer", "null"]
      required:
        - name

    UpdateActivityBody:
      type: object
      properties:
        name:
          type: ["string", "null"]
        plannedStartDate:
          type: ["string", "null"]
          format: date
        plannedEndDate:
          type: ["string", "null"]
          format: date
        actualStartDate:
          type: ["string", "null"]
          format: date
        actualEndDate:
          type: ["string", "null"]
          format: date
        plannedProgress:
          type: ["number", "null"]
        actualProgress:
          type: ["number", "null"]
        weight:
          type: ["number", "null"]
        status:
          type: ["string", "null"]
          enum: [not_started, in_progress, completed, delayed, null]
        sortOrder:
          type: ["integer", "null"]
        groupId:
          type: ["integer", "null"]

    # Reports
    Report:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        reportNumber:
          type: integer
        type:

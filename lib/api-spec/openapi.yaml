    CreateProjectBody:
      type: object
      properties:
        name:
          type: string
        location:
          type: string
        ownerEntity:
          type: string
        supervisorEntity:
          type: string
        contractor:
          type: string
        startDate:
          type: ["string", "null"]
          format: date
        expectedEndDate:
          type: ["string", "null"]
          format: date
        noSchedule:

        location:
          type: ["string", "null"]
        ownerEntity:
          type: ["string", "null"]
        supervisorEntity:
          type: ["string", "null"]
        contractor:
          type: ["string", "null"]
        startDate:
          type: ["string", "null"]
          format: date
        expectedEndDate:
          type: ["string", "null"]
          format: date
        actualEndDate:
          type: ["string", "null"]
          format: date
        noSchedule:
          type: ["boolean", "null"]
        status:
          type: ["string", "null"]
          enum: [active, completed, delayed, suspended, null]
        overallProgress:
          type: ["number", "null"]
        siteLatitude:
          type: ["number", "null"]
        siteLongitude:
          type: ["number", "null"]
        siteRadiusMeters:
          type: ["integer", "null"]

    # Activities
    Activity:
      type: object
